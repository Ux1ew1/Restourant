services:
  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env.production
    restart: "no"

  app:
    build:
      context: .
      target: runner
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
